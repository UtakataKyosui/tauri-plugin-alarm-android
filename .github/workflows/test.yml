name: Build and Test

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test.yml"
      - "**/*.rs"
      - "**/*.kt"
      - "**/Cargo.toml"
      - "**/build.gradle.kts"
      - "android/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/test.yml"
      - "**/*.rs"
      - "**/*.kt"
      - "**/Cargo.toml"
      - "**/build.gradle.kts"
      - "android/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-fmt:
    runs-on: ubuntu-latest
    name: Rust Format Check

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    runs-on: ubuntu-latest
    name: Rust Clippy Lint

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install webkit2gtk
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-4.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    name: Rust Tests
    needs: [rust-fmt, rust-clippy]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install webkit2gtk
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-4.1

      - uses: Swatinem/rust-cache@v2

      - name: Run Rust Tests
        run: cargo test
